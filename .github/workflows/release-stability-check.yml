name: Release Stability Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      workflow_id:
        description: "Dify workflow id (required when skip_failover_eval=false)"
        required: false
        default: ""
      rounds:
        description: "Stability rounds"
        required: true
        default: "3"
      interval_sec:
        description: "Interval seconds between rounds"
        required: true
        default: "30"
      skip_failover_eval:
        description: "Skip failover eval stage (artifact-only check)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  stability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Stability Check
        shell: bash
        env:
          DIFY_BASE_URL: ${{ secrets.DIFY_BASE_URL }}
          DIFY_APP_API_KEY: ${{ secrets.DIFY_APP_API_KEY }}
        run: |
          cmd=(
            python scripts/release/run_release_stability_check.py
            --repo-root .
            --rounds "${{ github.event.inputs.rounds }}"
            --interval-sec "${{ github.event.inputs.interval_sec }}"
            --release-policy-profile demo
            --release-policy-run-secondary
            --release-policy-secondary-profile prod
            --release-policy-enforce-secondary
            --release-policy-strict
          )

          if [ "${{ github.event.inputs.skip_failover_eval }}" = "true" ]; then
            cmd+=(--skip-failover-eval)
          else
            if [ -z "${{ github.event.inputs.workflow_id }}" ]; then
              echo "workflow_id is required when skip_failover_eval=false"
              exit 1
            fi
            cmd+=(--workflow-id "${{ github.event.inputs.workflow_id }}")
            if [ -n "${DIFY_BASE_URL}" ] && [ -n "${DIFY_APP_API_KEY}" ]; then
              cmd+=(--dify-base-url "${DIFY_BASE_URL}" --dify-app-key "${DIFY_APP_API_KEY}")
            fi
          fi

          "${cmd[@]}"

      - name: Upload Stability Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-stability-${{ github.run_id }}
          path: |
            docs/eval/release_stability_check.json
            docs/eval/release_stability_check.md
            artifacts/release_stability_check
