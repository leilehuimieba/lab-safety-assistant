    action: redirect_emergency
    severity: high
    response: "若吸入有害气体：立即转移到新鲜空气处，必要时求助医疗或实验室管理人员。"

  - id: R-018
    category: burn
    match_type: keywords
    patterns: ["烫伤", "烧伤", "灼伤", "热烫", "皮肤起泡"]
    confidence: high
    action: redirect_emergency
    severity: medium
    response: "若发生烫伤/灼伤：立即停止实验，用清水冷却并保护伤处，必要时就医。"

  - id: R-019
    category: cut_bleeding
    match_type: keywords
    patterns: ["割伤", "划伤", "出血", "流血", "被割到"]
    confidence: high
    action: redirect_emergency
    severity: medium
    response: "若发生割伤/出血：立即停止实验，清洁伤口并加压止血，必要时就医。"

  - id: R-020
    category: radiation_emergency
    match_type: keywords
    patterns: ["放射源丢失", "辐射污染", "意外照射", "放射性泄漏", "核素污染"]
    confidence: high
    action: redirect_emergency
    severity: critical
    response: "发生辐射事故：立即疏散周围人员并隔离区域，皮肤污染用流水清洗，第一时间通知辐射安全负责人，1小时内上报生态环境部门，配合专业机构处置。"

  - id: R-021
    category: laser_injury
    match_type: keywords
    patterns: ["激光伤眼", "激光照到眼", "激光灼伤", "被激光照射"]
    confidence: high
    action: redirect_emergency
    severity: high
    response: "激光伤眼是紧急情况：立即停止操作，用大量清水冲洗眼部，禁止揉眼，立即就医并告知激光波长和功率信息。"

  - id: R-022
    category: cryogenic_injury
    match_type: keywords
    patterns: ["液氮冻伤", "低温冻伤", "被液氮烫", "液氮溅到", "冻伤"]
    confidence: high
    action: redirect_emergency
    severity: high
    response: "低温冻伤处置：将冻伤部位浸入37-40°C温水中缓慢复温，禁止摩擦或揉搓，立即就医。若在密闭空间大量液氮泄漏，立即撤离至通风处。"

  - id: R-023
    category: centrifuge_violation
    match_type: keywords
    patterns: ["离心机转着", "离心机运转时", "离心机没停"]
    confidence: high
    action: refuse
    severity: high
    response: "绝对不能在离心机运转时开盖！必须等转子完全停止后才能打开，强行开盖有严重危险。"

  - id: R-024
    category: autoclave_violation
    match_type: keywords
    patterns: ["灭菌锅有压力", "灭菌结束立刻", "高压灭菌直接开"]
    confidence: high
    action: refuse
    severity: high
    response: "有压力时严禁强制开门！灭菌结束后须慢速放汽，等压力归零、温度降至安全值后，人站在两侧才能缓慢开盖。"
