    response: "若发生起火/冒烟：立即停止实验、切断电源/气源；在确保安全且受过培训的前提下使用灭火器；无法控制请立刻撤离并报警。"

  - id: R-014
    category: gas_leak
    match_type: keywords
    patterns: ["气体泄漏", "闻到异味", "气瓶泄漏", "煤气味", "有毒气体"]
    confidence: high
    action: redirect_emergency
    severity: high
    response: "若疑似气体泄漏：停止实验、关闭气源（在安全前提下），开启通风并撤离到安全区域，联系实验室管理人员处理。"

  - id: R-015
    category: chemical_spill
    match_type: keywords
    patterns: ["洒漏", "打翻", "化学品泄漏", "溶液洒在地上", "溅洒"]
