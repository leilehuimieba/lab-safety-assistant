name: Weekly Report

on:
  schedule:
    # Every Monday 01:00 UTC
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get Date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate Weekly Report
        run: |
          python scripts/generate_weekly_team_report.py --repo-root . --since "7 days ago" --until "now"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/weekly-report
          delete-branch: true
          commit-message: "chore: auto-generate weekly report ${{ steps.date.outputs.today }}"
          title: "chore: weekly report ${{ steps.date.outputs.today }}"
          body: |
            This PR is automatically generated by GitHub Actions.

            - Generated weekly report under `docs/weekly_reports/`
            - Please review and merge if content looks correct
          labels: |
            documentation
            weekly-report
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

