<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Safety Assistant Demo</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #64748b;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --secondary: #2563eb;
      --secondary-dark: #1d4ed8;
      --border: #dbe4ee;
      --warn-bg: #fffbeb;
      --warn-border: #fbbf24;
      --warn-text: #92400e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #d8f3ea, transparent 35%),
        radial-gradient(circle at 90% 0%, #dbeafe, transparent 35%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header h1 { margin: 0 0 8px; font-size: 30px; }
    .header p { margin: 0; color: var(--sub); line-height: 1.6; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
    }
    .mode-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .mode-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f8fafc;
      cursor: pointer;
      user-select: none;
    }
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
      min-height: 140px;
      line-height: 1.6;
    }
    .actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--secondary); color: white; }
    .btn-secondary:hover { background: var(--secondary-dark); }
    .btn-ghost { background: #e2e8f0; color: #334155; }
    .muted { color: var(--sub); font-size: 13px; }
    .result {
      line-height: 1.7;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 12px;
      min-height: 140px;
      overflow-wrap: anywhere;
    }
    .route-info { margin-top: 10px; color: #334155; font-size: 13px; }
    .low-confidence-alert {
      margin-top: 8px;
      border: 1px solid var(--warn-border);
      background: var(--warn-bg);
      color: var(--warn-text);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .citation-box { margin-top: 12px; border-top: 1px solid #dbe4ee; padding-top: 10px; }
    .citation-title { font-size: 14px; font-weight: 600; margin: 0 0 8px; color: #0f172a; }
    .citation-item {
      border: 1px solid #dbe4ee;
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.5;
    }
    .citation-item a { color: #0369a1; text-decoration: none; word-break: break-all; }
    .citation-item a:hover { text-decoration: underline; }
    .risk-box { margin-top: 14px; border-top: 1px solid #dbe4ee; padding-top: 10px; display: none; }
    .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .risk-pill {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      display: inline-block;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .risk-list { margin: 6px 0 0; padding-left: 18px; font-size: 13px; }
    .risk-list li { margin: 4px 0; }
    @media (max-width: 900px) { .risk-grid { grid-template-columns: 1fr; } }
    @media (min-width: 920px) { .grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Lab Safety Assistant Demo</h1>
      <p>Two core capabilities: safety Q&A and structured risk assessment with source traceability.</p>
    </header>

    <section class="grid">
      <div class="card">
        <h3>Input</h3>
        <div class="mode-group">
          <label class="mode-option"><input type="radio" name="mode" value="agent" /> Project Copilot</label>
          <label class="mode-option"><input type="radio" name="mode" value="lab" checked /> Lab Safety Assistant</label>
        </div>
        <textarea id="question" placeholder="Example: We plan to run an ethanol reflux experiment. What controls are required?"></textarea>
        <div class="actions">
          <button class="btn-primary" id="sendBtn">Q&A</button>
          <button class="btn-secondary" id="riskBtn">Risk Assess</button>
          <button class="btn-ghost" id="clearBtn">Clear</button>
        </div>
        <p class="muted">Tip: one scenario per request gives the most stable output.</p>
      </div>

      <div class="card">
        <h3>Output</h3>
        <div id="result" class="result">Waiting for input...</div>
        <p class="route-info" id="routeInfo"></p>
        <div id="lowConfidenceAlert" class="low-confidence-alert"></div>
        <div id="riskBox" class="risk-box"></div>
        <div id="citationBox" class="citation-box"></div>
        <p class="muted" id="metaInfo"></p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    const sendBtn = document.getElementById('sendBtn');
    const riskBtn = document.getElementById('riskBtn');
    const clearBtn = document.getElementById('clearBtn');
    const questionInput = document.getElementById('question');
    const result = document.getElementById('result');
    const routeInfo = document.getElementById('routeInfo');
    const lowConfidenceAlert = document.getElementById('lowConfidenceAlert');
    const citationBox = document.getElementById('citationBox');
    const metaInfo = document.getElementById('metaInfo');
    const riskBox = document.getElementById('riskBox');

    function getMode() {
      const checked = document.querySelector('input[name="mode"]:checked');
      return checked ? checked.value : 'lab';
    }

    function renderAnswer(rawText) {
      const text = String(rawText || '').trim();
      if (!text) {
        result.textContent = 'No model text returned.';
        return;
      }
      if (window.marked && window.DOMPurify) {
        marked.setOptions({ breaks: true, gfm: true });
        result.innerHTML = DOMPurify.sanitize(marked.parse(text));
      } else {
        result.textContent = text;
      }
    }

    function renderCitations(citations) {
      citationBox.innerHTML = '';
      if (!Array.isArray(citations) || citations.length === 0) {
        citationBox.innerHTML = '<p class="muted">No source citations matched.</p>';
        return;
      }
      const title = document.createElement('p');
      title.className = 'citation-title';
      title.textContent = 'Citations';
      citationBox.appendChild(title);
      citations.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'citation-item';
        card.innerHTML = `
          <div><strong>${index + 1}. [${item.kb_id || '-'}] ${item.title || 'Untitled item'}</strong></div>
          <div>source: ${item.source_title || '-'} | org: ${item.source_org || '-'} | risk: ${item.risk_level || '-'}</div>
          <div>${item.snippet || 'No snippet'}</div>
          ${item.source_url ? `<a href="${item.source_url}" target="_blank" rel="noopener noreferrer">${item.source_url}</a>` : ''}
        `;
        citationBox.appendChild(card);
      });
    }

    function renderRiskPanel(data) {
      const pills = (arr) => (arr || []).map(v => `<span class="risk-pill">${v}</span>`).join('');
      const list = (arr) => (arr || []).map(v => `<li>${v}</li>`).join('');
      riskBox.innerHTML = `
        <h4>Risk Assessment</h4>
        <div class="risk-grid">
          <div><strong>Risk level:</strong> ${data.risk_level || '-'} (${data.risk_score || '-'} / 5)</div>
          <div><strong>Low confidence:</strong> ${data.low_confidence ? (data.low_confidence_reason || 'yes') : 'no'}</div>
        </div>
        <div style="margin-top:8px;"><strong>Hazards:</strong> <div>${pills(data.key_hazards)}</div></div>
        <div style="margin-top:8px;"><strong>PPE:</strong> <div>${pills(data.ppe)}</div></div>
        <div class="risk-grid">
          <div><strong>Recommended steps</strong><ul class="risk-list">${list(data.recommended_steps)}</ul></div>
          <div><strong>Forbidden</strong><ul class="risk-list">${list(data.forbidden)}</ul></div>
        </div>
        <div style="margin-top:8px;"><strong>Emergency actions</strong><ul class="risk-list">${list(data.emergency_actions)}</ul></div>
      `;
      riskBox.style.display = 'block';
    }

    function renderLowConfidence(flag, reason) {
      if (flag) {
        lowConfidenceAlert.textContent = `Low confidence: ${reason || 'insufficient retrieval confidence'}`;
        lowConfidenceAlert.style.display = 'block';
      } else {
        lowConfidenceAlert.style.display = 'none';
        lowConfidenceAlert.textContent = '';
      }
    }

    async function ask() {
      const question = questionInput.value.trim();
      if (!question) { result.textContent = 'Please input a question first.'; return; }
      sendBtn.disabled = true;
      riskBtn.disabled = true;
      sendBtn.textContent = 'Running...';
      riskBox.style.display = 'none';
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: getMode(), question })
        });
        const data = await resp.json();
        if (!resp.ok) { result.textContent = data.detail || 'Request failed.'; return; }
        renderAnswer(data.answer || '');
        routeInfo.textContent = `decision=${data.decision || '-'} | rule=${data.matched_rule_id || '-'} | risk=${data.risk_level || '-'}`;
        metaInfo.textContent = `mode=${data.mode || '-'} | model=${data.model || '-'}`;
        renderLowConfidence(data.low_confidence, data.low_confidence_reason);
        renderCitations(data.citations || []);
      } catch (err) {
        result.textContent = `Request error: ${err.message}`;
      } finally {
        sendBtn.disabled = false;
        riskBtn.disabled = false;
        sendBtn.textContent = 'Q&A';
      }
    }

    async function assessRisk() {
      const scenario = questionInput.value.trim();
      if (!scenario) { result.textContent = 'Please input a scenario first.'; return; }
      sendBtn.disabled = true;
      riskBtn.disabled = true;
      riskBtn.textContent = 'Assessing...';
      try {
        const resp = await fetch('/api/risk_assess', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scenario })
        });
        const data = await resp.json();
        if (!resp.ok) { result.textContent = data.detail || 'Risk assess failed.'; return; }
        result.textContent = `Risk assessment completed.`;
        routeInfo.textContent = 'decision=structured_risk_assessment';
        metaInfo.textContent = `risk=${data.risk_level || '-'} (${data.risk_score || '-'}/5)`;
        renderLowConfidence(data.low_confidence, data.low_confidence_reason);
        renderRiskPanel(data);
        renderCitations(data.citations || []);
      } catch (err) {
        result.textContent = `Request error: ${err.message}`;
      } finally {
        sendBtn.disabled = false;
        riskBtn.disabled = false;
        riskBtn.textContent = 'Risk Assess';
      }
    }

    sendBtn.addEventListener('click', ask);
    riskBtn.addEventListener('click', assessRisk);
    clearBtn.addEventListener('click', () => {
      questionInput.value = '';
      result.textContent = 'Waiting for input...';
      routeInfo.textContent = '';
      lowConfidenceAlert.style.display = 'none';
      lowConfidenceAlert.textContent = '';
      riskBox.style.display = 'none';
      riskBox.innerHTML = '';
      citationBox.innerHTML = '';
      metaInfo.textContent = '';
    });
  </script>
</body>
</html>
