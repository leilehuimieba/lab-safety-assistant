name: Weekly V8 Data Refresh

on:
  schedule:
    # Every Wednesday 01:20 UTC
    - cron: "20 1 * * 3"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-v8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get Date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Run V8 Release Pipeline
        shell: pwsh
        run: |
          ./scripts/run_v8_release.ps1

      - name: Validate Data Sources
        run: |
          python scripts/validate_data_sources.py --repo-root .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/weekly-v8-data-refresh
          delete-branch: true
          commit-message: "chore: weekly v8 data refresh ${{ steps.date.outputs.today }}"
          title: "chore: weekly v8 data refresh ${{ steps.date.outputs.today }}"
          body: |
            This PR is automatically generated by GitHub Actions.

            - Ran `scripts/run_v8_release.ps1`
            - Refreshed V8 prefetch status/report and task assignment
            - Rebuilt `release_exports/v8/knowledge_base_import_ready.csv`
            - Updated V8 release reports and rewrite logs

            Please review source quality and merge when ready.
          labels: |
            data-refresh
            weekly-report
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

