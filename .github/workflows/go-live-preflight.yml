name: Go Live Preflight

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_dir:
        description: "Release package directory"
        required: true
        default: "release_exports/v8.1"
      enforce_prod_policy:
        description: "Enforce prod policy as a hard gate"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Go-Live Preflight
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.enforce_prod_policy }}" = "false" ]; then
            EXTRA_FLAGS="--no-enforce-prod-policy"
          fi
          python scripts/release/go_live_preflight.py \
            --repo-root . \
            --release-dir "${{ github.event.inputs.release_dir }}" \
            ${EXTRA_FLAGS}

      - name: Upload Preflight Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-live-preflight-${{ github.run_id }}
          path: |
            docs/ops/go_live_readiness.json
            docs/ops/go_live_readiness.md
