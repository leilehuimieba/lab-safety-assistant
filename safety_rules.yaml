    response: "若发生化学品泄漏：隔离现场、避免接触和吸入，在安全前提下通风并使用泄漏应急物资处理，立即报告实验室管理人员。"

  - id: R-016
    category: ingestion
    match_type: keywords
    patterns: ["误食", "误饮", "吞咽", "喝到", "摄入", "中毒"]
    confidence: high
