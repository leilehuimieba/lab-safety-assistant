name: Quality Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests PyYAML fastapi pydantic -r scripts/requirements-web-ingest.txt

      - name: Run Quality Gate
        run: |
          python scripts/quality_gate.py

      - name: Run Pytest
        run: |
          pytest
